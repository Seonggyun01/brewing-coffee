spring:
  application:
    name: coffee

  config:
    import: optional:classpath:application-local.yml

  datasource:
    url: jdbc:h2:mem:brewlog
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.hibernate.SQL: debug

brewlog:
  dummy-data:
    enabled: true
  ocr:
    provider: google-vision
