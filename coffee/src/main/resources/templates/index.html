<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrewLog Origin Map</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/origin-map.css(v=12)}">
</head>
<body class="origin-map-page">
    <header class="app-header">
        <a class="app-header__brand" th:href="@{/}">
            <span class="app-header__logo">B</span>
            <strong>BrewLog</strong>
        </a>
        <nav class="app-header__nav" aria-label="주요 메뉴">
            <a class="is-active" th:href="@{/}">Home</a>
            <a th:href="@{/coffee-beans}">Beans</a>
            <a th:href="@{/brew-records}">Brew Records</a>
            <a th:href="@{/cafes/map}">Cafe Map</a>
        </nav>
        <a class="button button--primary" th:href="@{/coffee-beans/new}">새 원두 등록</a>
    </header>

    <main class="origin-map-shell">
        <section class="origin-map-visual" aria-label="커피 원산지 세계 지도">
            <div class="origin-map-stage" th:replace="~{fragments/world-map :: worldMap}"></div>
            <div class="origin-map-zoom" aria-label="세계 지도 확대 조절">
                <button type="button" data-origin-zoom-out aria-label="지도 축소">−</button>
                <span data-origin-zoom-label>100%</span>
                <button type="button" data-origin-zoom-in aria-label="지도 확대">+</button>
                <button type="button" data-origin-zoom-reset>초기화</button>
            </div>

            <section class="origin-map-stats" aria-label="원산지 경험 요약">
                <article>
                    <span>Countries</span>
                    <strong data-stat="countries">0</strong>
                    <small>경험한 산지</small>
                </article>
                <article>
                    <span>Beans</span>
                    <strong data-stat="beans">0</strong>
                    <small>기록한 원두</small>
                </article>
                <article>
                    <span>Brews</span>
                    <strong data-stat="brews">0</strong>
                    <small>브루잉 순간</small>
                </article>
            </section>
        </section>

        <aside class="origin-country-panel" data-country-panel aria-live="polite" hidden>
            <button class="origin-country-panel__close" type="button" data-country-panel-close aria-label="국가 정보 닫기">×</button>
            <p class="origin-country-panel__eyebrow">Selected Country</p>
            <h1 data-country-name>국가를 선택하세요</h1>
            <p data-country-summary>지도에서 색이 칠해진 산지를 선택하면 원두 기록을 볼 수 있어요.</p>
            <a class="origin-country-panel__cta" data-country-link th:href="@{/coffee-beans}">전체 원두 보기</a>

            <div class="origin-country-panel__meta">
                <span>색상 기준</span>
                <p>1개, 2-3개, 4개 이상 원두 경험에 따라 진하게 표시됩니다.</p>
            </div>

            <section class="origin-bean-preview">
                <div>
                    <h2>최근 원두</h2>
                    <a data-country-more th:href="@{/coffee-beans}">전체 보기</a>
                </div>
                <div class="origin-bean-preview__list" data-recent-beans>
                    <p>아직 선택된 국가가 없습니다.</p>
                </div>
            </section>
        </aside>
    </main>

    <script th:src="@{/js/origin-map.js(v=10)}"></script>
</body>
</html>
