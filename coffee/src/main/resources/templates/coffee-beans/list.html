<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>원두 관리 - BrewLog</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
    <main class="page">
        <header class="page__header">
            <div>
                <a class="text-link" th:href="@{/}">BrewLog</a>
                <h1>원두 관리</h1>
            </div>
            <a class="button button--primary" th:href="@{/coffee-beans/new}">새 원두 등록</a>
        </header>

        <p class="flash" th:if="${message}" th:text="${message}"></p>

        <form class="search" th:action="@{/coffee-beans}" method="get">
            <input type="search" name="keyword" th:value="${keyword}" placeholder="원두 이름으로 검색">
            <button class="button button--secondary" type="submit">검색</button>
            <a class="button button--ghost" th:href="@{/coffee-beans}">초기화</a>
        </form>

        <section class="record-grid" th:if="${!#lists.isEmpty(coffeeBeans)}">
            <article class="record-card coffee-bean-card" th:each="coffeeBean : ${coffeeBeans}">
                <a class="record-card__link" th:href="@{/coffee-beans/{id}(id=${coffeeBean.id})}">
                    <span class="flavor-gradient" th:style="${coffeeBean.flavorGradientStyle}"></span>
                    <span class="record-card__date" th:text="${coffeeBean.status != null ? coffeeBean.status.displayName : '상태 미기록'}">보유 중</span>
                    <strong th:text="${coffeeBean.name}">에티오피아 구지</strong>
                    <span th:text="${coffeeBean.roastery ?: '로스터리 미기록'}">브루잉 로스터스</span>
                    <span th:text="${(coffeeBean.country ?: '산지 미기록') + (coffeeBean.region != null ? ' / ' + coffeeBean.region : '')}">Ethiopia / Guji</span>
                    <span th:text="${coffeeBean.processType != null ? coffeeBean.processType : '가공 미기록'}">WASHED</span>
                    <div class="coffee-bean-card__meta">
                        <span th:text="${coffeeBean.weight != null ? coffeeBean.weight + 'g 남음' : '무게 미기록'}">200g 남음</span>
                        <span th:text="${coffeeBean.price != null ? #numbers.formatInteger(coffeeBean.price, 0, 'COMMA') + '원' : '가격 미기록'}">18,000원</span>
                    </div>
                    <span class="record-card__notes" th:text="${coffeeBean.flavorNoteSummary}">자스민, 레몬, 복숭아</span>
                </a>
            </article>
        </section>

        <section class="empty-panel" th:if="${#lists.isEmpty(coffeeBeans)}">
            <p>등록된 원두가 없습니다.</p>
            <a class="button button--secondary" th:href="@{/coffee-beans/new}">첫 원두 등록하기</a>
        </section>
    </main>
</body>
</html>
